# ──────────────────────────────────────────────────────────────────────────────
# HOW TO EMBED IN YOUR PROFILE README
# ──────────────────────────────────────────────────────────────────────────────
# 1. Place this file in your profile repo (github.com/truelockmc/truelockmc)
#    at the path:  .github/workflows/contributions.yml
#
# 2. Add these two comment markers anywhere in your README.md where you want
#    the table to appear, the workflow will write the content between them:
#
#      <!--START_SECTION:contributions-->
#      <!--END_SECTION:contributions-->
#
# 3. First run: trigger the workflow manually via
#    GitHub → Actions → "Update Contributions" → "Run workflow"
#    After that it runs automatically every Monday.
#
# 4. By default GITHUB_TOKEN has no write access on profile repos.
#    Enable it under:
#    Settings → Actions → General → Workflow permissions → "Read and write"
# ──────────────────────────────────────────────────────────────────────────────

name: Update Contributions

on:
  schedule:
    - cron: "0 4 * * 1" 
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & inject contributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: truelockmc
          MIN_STARS: 2
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, re

          user  = os.environ["GH_USER"]
          token = os.environ["GH_TOKEN"]
          min_s = int(os.environ["MIN_STARS"])

          def gh(url):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Alle gemergten PRs an fremden Repos
          q  = f"type:pr author:{user} is:merged -user:{user}"
          data = gh(f"https://api.github.com/search/issues?q={urllib.parse.quote(q)}&per_page=100&sort=updated")

          import urllib.parse
          repo_map = {}
          for item in data.get("items", []):
              url = item["repository_url"]
              repo_map[url] = repo_map.get(url, 0) + 1

          rows = []
          for repo_url, pr_count in repo_map.items():
              try:
                  rd = gh(repo_url)
              except Exception:
                  continue
              if rd.get("stargazers_count", 0) <= min_s:
                  continue
              rows.append((rd["stargazers_count"], pr_count, rd))

          rows.sort(reverse=True)

          lines = ["| Repo | Stars | Language | PRs merged |",
                   "|------|------:|----------|:----------:|"]
          for stars, prs, rd in rows:
              name  = rd["full_name"]
              url   = rd["html_url"]
              lang  = rd.get("language") or "—"
              s_fmt = f"{stars/1000:.1f}k" if stars >= 1000 else str(stars)
              lines.append(f"| [{name}]({url}) | ⭐ {s_fmt} | {lang} | {prs} |")

          block = "\n".join(lines)

          with open("README.md") as f:
              content = f.read()

          content = re.sub(
              r"<!--START_SECTION:contributions-->.*?<!--END_SECTION:contributions-->",
              f"<!--START_SECTION:contributions-->\n{block}\n<!--END_SECTION:contributions-->",
              content, flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(content)
          print("Done.")
          EOF

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update contributions"
          git push
