# ──────────────────────────────────────────────────────────────────────────────
# HOW TO EMBED IN YOUR PROFILE README
# ──────────────────────────────────────────────────────────────────────────────
# 1. Place BOTH files in your profile repo (github.com/truelockmc/truelockmc):
#      .github/workflows/contributions.yml   ← this file
#      .github/scripts/generate_svg.py       ← the generator script
#
# 2. Add this line anywhere in your README.md:
#      ![Contributions](contributions.svg)
#
# 3. First run: GitHub → Actions → "Update Contributions" → "Run workflow"
#    After that it runs automatically every Monday.
#
# 4. Enable write permissions:
#    Settings → Actions → General → Workflow permissions → "Read and write"
# ──────────────────────────────────────────────────────────────────────────────

name: Update Contributions

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contributions SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: truelockmc
          MIN_STARS: "2"
        run: python3 .github/scripts/generate_svg.py

      - name: Commit SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contributions.svg
          git diff --cached --quiet || git commit -m "chore: update contributions card"
          git push
